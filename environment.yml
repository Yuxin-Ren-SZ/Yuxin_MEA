name: yuxin_mea
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - ipykernel
  - ipywidgets
  - jupyterlab
  - notebook
  - pandas
  - pre-commit
  - pytest
  - scipy
  - scikit-learn
  - h5py
  - zarr
  - spikeinterface
  - pynvml
  - plotly
  - matplotlib
  - dash>=2.14
  - hdbscan
  - umap-learn
  - joblib
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - "torch==2.10.0+cu128"
    - "torchvision==0.25.0+cu128"
    - "torchaudio==2.10.0+cu128"
    - kilosort
    - "flask-caching>=2.1"   # dashboard persistent read cache (Caching guide Tier 2)
    - "diskcache>=5.6"       # Dash background-callback manager (Caching guide §4)

